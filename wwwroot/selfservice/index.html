<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Self-Service Reset - KeyStone</title>
    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/bootstrap-icons.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-key-fill"></i> KeyStone AD Manager
            </a>
        </div>
    </nav>

    <main class="flex-grow-1 container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h2 class="card-title text-center mb-4"><i class="bi bi-person-lock me-2"></i>Self-Service Password Reset</h2>
                        <form id="resetForm" class="needs-validation" novalidate>
                            <div class="mb-3">
                                <label for="domain" class="form-label">Domain</label>
                                <select id="domain" class="form-select" required></select>
                            </div>
                            <div class="mb-3">
                                <label for="sam" class="form-label">Username (SAM Account Name)</label>
                                <input type="text" id="sam" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label for="dob" class="form-label">Birthdate</label>
                                <input type="date" id="dob" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label for="mobile" class="form-label">Last 4 Digits of Mobile Number</label>
                                <input type="text" id="mobile" class="form-control" maxlength="4" required>
                            </div>
                            <hr>
                            <div class="mb-3">
                                <label for="p1" class="form-label">New Password</label>
                                <input type="password" id="p1" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label for="p2" class="form-label">Confirm New Password</label>
                                <input type="password" id="p2" class="form-control" required>
                            </div>
                            <div class="d-grid">
                                <button type="button" id="resetBtn" class="btn btn-primary btn-lg">Reset Password</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer mt-auto py-3 bg-primary text-white text-center">
        <div class="container">
            <span>&copy; 2024 KeyStone AD Web Manager</span>
        </div>
    </footer>

    <!-- Info/Confirm Modals -->
    <div class="modal fade" id="infoModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5 class="modal-title" id="infoModalTitle">Notice</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body" id="infoModalBody"></div><div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button></div></div></div></div>
    
    <script src="../js/jquery.min.js"></script>
    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/app.selfservice.js"></script>

</body>
</html>
