<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Self-Service Password Reset</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="stylesheet" href="/css/bootstrap.min.css"/>
</head>
<body class="bg-white">
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="card shadow-sm">
          <div class="card-header bg-primary text-white">Self-Service Password Reset</div>
          <div class="card-body">
            <form id="selfForm" class="needs-validation" novalidate>
              <div class="mb-3">
                <label class="form-label">Domain</label>
                <input id="domain" class="form-control" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Username</label>
                <input id="username" class="form-control" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Date of Birth</label>
                <input id="dob" type="date" class="form-control" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Last 4 digits of Mobile</label>
                <input id="mobile4" maxlength="4" class="form-control" required>
              </div>
              <div class="mb-3">
                <label class="form-label">New Password</label>
                <input id="newpass" type="password" class="form-control" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Retype Password</label>
                <input id="repass" type="password" class="form-control" required>
              </div>
              <button class="btn btn-primary w-100" type="submit">Reset Password</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>
  <div class="modal fade" id="infoModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered"><div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Notice</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body" id="infoModalBody"></div>
      <div class="modal-footer"><button class="btn btn-primary" data-bs-dismiss="modal">OK</button></div>
    </div></div>
  </div>
  <script src="/js/bootstrap.bundle.min.js"></script>
  <script src="/js/jquery.min.js"></script>
  <script>
    $('#selfForm').on('submit', async function(e){
      e.preventDefault();
      const d = {
        domain: $('#domain').val(),
        username: $('#username').val(),
        dob: $('#dob').val(),
        mobile4: $('#mobile4').val(),
        newPassword: $('#newpass').val(),
        rePassword: $('#repass').val()
      };
      if(d.newPassword!==d.rePassword){showInfo('Passwords do not match');return;}
      try {
        await api('/api/selfservice/reset','POST',d);
        showInfo('Password reset successful.');
      } catch(err){showInfo('Error: '+err.message);}
    });
    function showInfo(msg){
      $('#infoModalBody').text(msg);
      new bootstrap.Modal(document.getElementById('infoModal')).show();
    }
  </script>
</body>
</html>
