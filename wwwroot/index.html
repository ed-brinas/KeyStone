<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>KeyStone AD Web Manager</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="bi bi-key-fill"></i> KeyStone AD Manager
            </a>
        </div>
    </nav>

    <main class="flex-grow-1 container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center">
                <div class="lc-block mb-4">
                    <div editable="rich">
                        <h1 class="display-3 fw-bold">Welcome to KeyStone</h1>
                        <p class="lead">Your central hub for Active Directory management.</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="row justify-content-center g-4">
            <div class="col-md-5">
                <a href="/admin/" class="card text-decoration-none card-hover h-100">
                    <div class="card-body text-center p-4">
                        <i class="bi bi-person-badge-fill display-2 text-primary"></i>
                        <h3 class="card-title mt-3">Admin Portal</h3>
                        <p class="card-text">Manage users, reset passwords, and oversee Active Directory accounts.</p>
                    </div>
                </a>
            </div>
            <div class="col-md-5">
                <a href="/selfservice/" class="card text-decoration-none card-hover h-100">
                    <div class="card-body text-center p-4">
                        <i class="bi bi-person-lock display-2 text-primary"></i>
                        <h3 class="card-title mt-3">Self-Service Reset</h3>
                        <p class="card-text">Allows end-users to securely reset their own passwords.</p>
                    </div>
                </a>
            </div>
        </div>
    </main>

    <footer class="footer mt-auto py-3 bg-primary text-white text-center">
        <div class="container">
            <span>&copy; 2024 KeyStone AD Web Manager</span>
        </div>
    </footer>

    <script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
